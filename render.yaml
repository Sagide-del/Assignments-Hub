# Render blueprint — two services from one repo, per the target monorepo
# layout (backend/ = NestJS API, frontend/ = React static site).
# Docs: https://render.com/docs/blueprint-spec
#
# Domain layout this assumes (adjust to what's actually registered):
#   Marketing/app: app.assignmenthub.co.ke -> frontend static site
#   API:           api.assignmenthub.co.ke -> backend web service

services:
  - type: web
    name: assignments-hub-api
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: CORS_ORIGIN
        value: https://app.assignmenthub.co.ke
      - key: INTASEND_PUBLISHABLE_KEY
        sync: false
      - key: INTASEND_SECRET_KEY
        sync: false
      - key: INTASEND_TEST_MODE
        value: "false"
      - key: INTASEND_WEBHOOK_SECRET
        sync: false

  - type: web
    name: assignments-hub-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://api.assignmenthub.co.ke/api/v1
    routes:
      # SPA fallback — react-router handles client-side routing.
      - type: rewrite
        source: /*
        destination: /index.html
